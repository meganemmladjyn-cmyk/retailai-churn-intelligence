name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: retailai
          POSTGRES_PASSWORD: password
          POSTGRES_DB: retailai_churn_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint with Ruff
        run: ruff check app/ ml/ data/ tests/

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://retailai:password@localhost:5432/retailai_churn_test
          DEBUG: "false"
        # API tests require a live PostgreSQL connection and will be enabled at Day 4.
        run: pytest tests/ -v --tb=short --ignore=tests/test_api.py
