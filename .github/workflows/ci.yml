name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system -r requirements.txt faker pytest pytest-asyncio lightgbm

      - name: Generate test data
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          uv pip install --system faker
          python data/generate.py
          python src/data/cleaner.py
          python src/features/run_features.py
          python src/models/train.py

      - name: Run tests
        run: >
          python -m pytest
          tests/test_ml.py
          tests/test_data_quality.py
          tests/test_features.py
          tests/test_model.py
          -v

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint with ruff
        run: ruff check src/ app/
